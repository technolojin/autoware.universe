
# module
module: a_sensor
package: autoware_perception_dummy_nodes
plugin: autoware::perception_dummy_nodes::ASensorDriver

# interface
input: []

output:
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2

# process 
process:
  - name: detector
    trigger_conditions:
      - periodic: 10.0
    outcome:
      - to_output: pointcloud

